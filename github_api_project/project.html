<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Profile Finder - By Ayush Dwivedi</title>
    <link rel="stylesheet" href="project.css">
</head>
<body>

    <div class="container">
        <h1>GitHub Profile Finder - By Ayush Dwivedi</h1>

        <div class="search-box">
            <input
                type="text"
                id="username"
                placeholder="Enter GitHub Username"
            >
            <button id="searchBtn">Search</button>
        </div>

        <div id="error"></div>

        <div class="card" id="card">
            <img id="avatar" src="" alt="Profile Picture">

            <h2 id="name"></h2>

            <div class="stats">
                <p>Followers: <span id="followers"></span></p>
                <p>Following: <span id="following"></span></p>
                <p>Repositories: <span id="repos"></span></p>
            </div>
        </div>
    </div>

    <script src="project.js"></script>
</body>
</html>
